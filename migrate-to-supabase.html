<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migrate to Supabase</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            background: #1565C0;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #0D47A1;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #f5f5f5;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Migrate LocalStorage Data to Supabase</h1>
    <p>This tool will migrate your existing users and transactions from localStorage to Supabase.</p>
    
    <button onclick="migrateData()">Start Migration</button>
    <button onclick="checkData()">Check LocalStorage Data</button>
    
    <div id="status" class="status"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const supabaseUrl = 'https://prjezxbbkqoieockoymh.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByamV6eGJia3FvaWVvY2tveW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MjIzOTgsImV4cCI6MjA4ODA5ODM5OH0.06egx5ok0Z7kAjv9NMP0xTqbunSR8CzrnyLe-YnYMBs';
        const supabase = createClient(supabaseUrl, supabaseKey);

        window.checkData = function() {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
            
            document.getElementById('status').innerHTML = `
                <h3>LocalStorage Data:</h3>
                <p>Users: ${users.length}</p>
                <p>Transactions: ${transactions.length}</p>
                <pre>${JSON.stringify({users, transactions}, null, 2)}</pre>
            `;
        };

        window.migrateData = async function() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '<p>Starting migration...</p>';

            try {
                // Get data from localStorage
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');

                if (users.length === 0 && transactions.length === 0) {
                    statusDiv.innerHTML = '<p class="error">No data found in localStorage!</p>';
                    return;
                }

                // Migrate users
                if (users.length > 0) {
                    statusDiv.innerHTML += `<p>Migrating ${users.length} users...</p>`;
                    
                    for (const user of users) {
                        const { error } = await supabase
                            .from('users')
                            .insert([{
                                id: user.id,
                                name: user.name,
                                phone: user.phone,
                                referral: user.referral,
                                created_at: user.createdAt
                            }]);
                        
                        if (error && error.code !== '23505') { // Ignore duplicate key errors
                            console.error('Error migrating user:', error);
                        }
                    }
                    statusDiv.innerHTML += '<p class="success">✓ Users migrated!</p>';
                }

                // Migrate transactions
                if (transactions.length > 0) {
                    statusDiv.innerHTML += `<p>Migrating ${transactions.length} transactions...</p>`;
                    
                    for (const transaction of transactions) {
                        const { error } = await supabase
                            .from('transactions')
                            .insert([{
                                id: transaction.id,
                                user_id: transaction.userId,
                                user_name: transaction.userName,
                                user_phone: transaction.userPhone,
                                amount: transaction.amount,
                                purpose: transaction.purpose,
                                created_at: transaction.createdAt
                            }]);
                        
                        if (error && error.code !== '23505') { // Ignore duplicate key errors
                            console.error('Error migrating transaction:', error);
                        }
                    }
                    statusDiv.innerHTML += '<p class="success">✓ Transactions migrated!</p>';
                }

                statusDiv.innerHTML += '<p class="success"><strong>Migration completed successfully!</strong></p>';
                statusDiv.innerHTML += '<p>You can now use the app with Supabase.</p>';

            } catch (error) {
                statusDiv.innerHTML += `<p class="error">Error: ${error.message}</p>`;
                console.error('Migration error:', error);
            }
        };
    </script>
</body>
</html>
